import unittest
import os


class TestHTMLFile(unittest.TestCase):
    HTML_FILE = "index.html"

    def setUp(self):
        if not os.path.exists(self.HTML_FILE):
            self.skipTest(f"{self.HTML_FILE} not found")
        with open(self.HTML_FILE, "r", encoding="utf-8") as f:
            self.html = f.read()

    def test_html_has_doctype(self):
        self.assertIn("<!DOCTYPE html>", self.html)

    def test_html_has_title(self):
        self.assertIn("<title>", self.html)

    def test_html_has_h1(self):
        self.assertIn("<h1>", self.html)

    def test_html_has_team_list(self):
        self.assertIn('id="team-list"', self.html)

    def test_html_greeting(self):
        self.assertIn("Hello GitHub Actions!", self.html)


if __name__ == "__main__":
    unittest.main(verbosity=2)
